services:
  iso-builder:
    build: .
    privileged: true
    volumes:
      - ${UBUNTU_ISO:?Set UBUNTU_ISO to the path of your source Ubuntu ISO}:/input/base.iso:ro
      - ./overlay:/build/overlay:ro
      - ./work:/build/work
      - ./output:/output
    environment:
      TZ:           ${TZ:-UTC}
      LABEL:        ${LABEL:-CUSTOM_UBUNTU}
      SQUASHFS:     ${SQUASHFS:-}
      OUTPUT_NAME:  ${OUTPUT_NAME:-custom-ubuntu}
