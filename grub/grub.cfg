set default=0
set timeout=10

# Load video support for graphical boot
if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod efi_gop
    insmod efi_uga
    insmod gfxterm
    terminal_output gfxterm
fi

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Custom Ubuntu — RAM boot (quiet)" {
    set gfxpayload=keep
    linux   /casper/vmlinuz \
                boot=casper \
                toram \
                quiet splash \
                ---
    initrd  /casper/initrd
}

menuentry "Custom Ubuntu — RAM boot (verbose)" {
    linux   /casper/vmlinuz \
                boot=casper \
                toram \
                ---
    initrd  /casper/initrd
}

menuentry "Custom Ubuntu — run from media (no RAM copy)" {
    set gfxpayload=keep
    linux   /casper/vmlinuz \
                boot=casper \
                quiet splash \
                ---
    initrd  /casper/initrd
}
