# GRUB configuration for the custom ISO
# This is an example file. Uncomment the menu entries you want to use.

# Default menu entry to boot (0 = first entry)
set default=${GRUB_DEFAULT}

# Seconds to wait before booting the default entry (0 = boot immediately)
set timeout=${GRUB_TIMEOUT}

# Load video support for graphical boot
if loadfont /boot/grub/font.pf2 ; then
    set gfxmode=auto
    insmod efi_gop
    insmod efi_uga
    insmod gfxterm
    terminal_output gfxterm
fi

# Menu colors
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray


# ---------------------------------------------------------------------------
# NORMAL BOOT - run the live system directly from the installation media.
# Nothing is copied to RAM. This uses less memory but requires the media to
# stay inserted for the entire session. Suitable for most use cases.
# ---------------------------------------------------------------------------
menuentry "${GRUB_TITLE} - normal boot" {
    set gfxpayload=keep
    linux   /casper/vmlinuz \
                boot=casper \
                quiet splash \
                ---
    initrd  /casper/initrd
}


# ---------------------------------------------------------------------------
# RAM BOOT (quiet) - copy the entire squashfs image into RAM before booting.
# After the copy is complete the media can be removed. The system runs faster
# since all reads come from RAM, but requires enough free RAM to hold the image
# (typically 2–4 GB on top of normal runtime usage).
# ---------------------------------------------------------------------------
